name: docker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - apps/**
      - packages/**
      - package.json
      - docker-compose.yml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t hxrizxn-api:${{ github.sha }} apps/api
      - run: docker build -t hxrizxn-web:${{ github.sha }} apps/web

