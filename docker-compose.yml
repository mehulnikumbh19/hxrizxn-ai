services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: hxrizxn
      POSTGRES_PASSWORD: hxrizxn
      POSTGRES_DB: hxrizxn
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hxrizxn -d hxrizxn"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    env_file:
      - .env
    environment:
      APP_ENV: development
      DEMO_MODE: "false"
      DATABASE_URL: postgresql+psycopg://hxrizxn:hxrizxn@postgres:5432/hxrizxn
      API_CORS_ORIGINS: http://localhost:3000
      # Model credentials passed through from the host environment / root .env.
      # Without these the container has no keys and falls back to mock mode even
      # when DEMO_MODE is false.
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4.1-mini}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2025-04-01-preview}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres-data:

